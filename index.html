<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>双葉 オーダーシステム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;700&family=Noto+Sans+JP:wght@400;500&display=swap">
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    .table-row {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .table-row-num {
      font-size: .85rem; color: var(--gold); font-weight: 700;
      border-radius: 3px; padding: 2px 8px; flex-shrink: 0; min-width: 40px; text-align: center;
      background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.2);
    }
    .table-row-name    { flex: 1; font-size: .85rem; color: #aaa; min-width: 0; }
    .table-row-guests  { font-size: .75rem; color: #aaa; flex-shrink: 0; }
    .table-row-total   { font-size: .9rem; color: var(--gold); font-weight: 700; flex-shrink: 0; }
    .table-row-pending { font-size: .65rem; color: #e08030; flex-shrink: 0; }
    .table-row-btn {
      flex-shrink: 0;
      background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.35);
      color: var(--gold); font-size: .8rem; font-weight: 700;
      padding: 6px 12px; border-radius: 5px; cursor: pointer; font-family: inherit;
    }
    .table-row-btn:active { background: rgba(201,168,76,.28); }
    .table-row-btn--billing {
      background: rgba(80,160,100,.12); border-color: rgba(80,160,100,.35);
      color: #6dba88;
    }
    .table-row-btn--billing:active { background: rgba(80,160,100,.28); }
    .order-form-inner { padding: 0 16px; }
    .table-found-info { margin-top: 5px; min-height: 1.3em; font-size: .85rem; color: var(--gold); }
    .table-found-info.error { color: #e06060; }
    .preview-card {
      background: rgba(255,255,255,.05); border: 1px solid rgba(201,168,76,.2);
      border-radius: 10px; margin: 16px; padding: 16px;
    }
    .preview-table-name { font-size: 1.05rem; color: var(--gold); font-weight: 700; margin-bottom: 3px; }
    .preview-memo {
      font-size: .8rem; color: #e09090; margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .preview-item {
      display: flex; align-items: center; padding: 7px 0; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,.06); font-size: .9rem; color: #e8dcc8;
    }
    .preview-item-name { flex: 1; }
    .preview-item-qty  { color: #aaa; font-size: .8rem; white-space: nowrap; }
    .preview-item-sub  { color: var(--gold); font-weight: 600; white-space: nowrap; }
    .preview-total-row {
      display: flex; justify-content: space-between; padding: 12px 0 0;
      font-size: 1.05rem; font-weight: 700; color: var(--gold);
    }
    .preview-actions { display: flex; gap: 10px; padding: 16px; }
    .billing-search-wrap { padding: 12px 16px 4px; }
    .billing-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09);
      border-radius: 10px; margin: 8px 16px; overflow: hidden;
    }
    .billing-card details > summary { list-style: none; }
    .billing-card details > summary::-webkit-details-marker { display: none; }
    .billing-summary {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 13px 14px 10px; cursor: pointer; gap: 10px;
    }
    .billing-summary:active { background: rgba(255,255,255,.03); }
    .billing-left { flex: 1; min-width: 0; }
    .billing-tablenum { font-size: 1.3rem; color: var(--gold); font-weight: 700; margin-bottom: 3px; }
    .billing-name     { font-size: .8rem; color: #aaa; }
    .billing-right    { text-align: right; flex-shrink: 0; }
    .billing-total-amount { font-size: 1.1rem; color: var(--gold); font-weight: 700; }
    .billing-per-person   { font-size: .65rem; color: #999; margin-top: 1px; }
    .billing-arrow { font-size: .7rem; color: #666; transition: transform .2s; align-self: center; flex-shrink: 0; }
    .billing-card details[open] .billing-arrow { transform: rotate(90deg); }
    .billing-items { border-top: 1px solid rgba(255,255,255,.07); padding: 8px 14px 4px; }
    .billing-item-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
    .billing-item-name { flex: 1; font-size: .88rem; color: #d4c8b0; min-width: 0; }
    .billing-item-qty  { font-size: .8rem; color: #999; margin: 0 8px; white-space: nowrap; }
    .billing-item-sub  { font-size: .88rem; color: #c8b870; font-weight: 600; white-space: nowrap; }
    .billing-item-price-wrap { display: flex; align-items: center; gap: 4px; margin-right: 8px; white-space: nowrap; }
    .billing-item-unit { font-size: .8rem; color: #aaa; }
    .billing-item-unit.price-edited { color: #e09030; font-weight: 700; }
    .billing-edit-price-btn {
      background: none; border: 1px solid rgba(255,255,255,.2); border-radius: 4px;
      color: #aaa; font-size: .75rem; padding: 1px 5px; cursor: pointer; line-height: 1.4;
    }
    .billing-edit-price-btn:active { background: rgba(255,255,255,.1); }
    .billing-paid-wrap { padding: 10px 14px; }
    .billing-item-memo {
      width: 100%; font-size: .72rem; color: #e09060;
      padding: 1px 0 4px 2px; letter-spacing: .02em;
    }
    /* メニュー行のメモ入力 */
    .menu-item-info { flex: 1; min-width: 0; }
    .item-memo-input {
      width: 80px; flex-shrink: 0;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px; color: #e8dcc8; font-size: .72rem;
      padding: 4px 7px; font-family: inherit; outline: none;
    }
    .item-memo-input::placeholder { color: #666; }
    .item-memo-input:focus { border-color: rgba(201,168,76,.4); background: rgba(201,168,76,.05); }
    /* プレビューのアイテムメモ */
    .preview-item-note {
      font-size: .72rem; color: #e09060; flex-shrink: 0;
      background: rgba(224,144,96,.1); border-radius: 3px; padding: 1px 5px;
    }

    /* ─── ハンバーガーボタン ─── */
    .hamburger-btn {
      margin-left: auto; background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 4px; padding: 6px; border-radius: 6px;
    }
    .hamburger-btn span {
      display: block; width: 20px; height: 2px;
      background: var(--gold, #c9a84c); border-radius: 2px;
    }
    .hamburger-btn:active { background: rgba(201,168,76,.1); }

    /* ─── ハンバーガードロワー ─── */
    .hm-overlay {
      position: fixed; inset: 0; z-index: 99;
      background: rgba(0,0,0,.45);
    }
    .hm-panel {
      position: fixed; top: 56px; right: 12px; z-index: 100;
      background: #1e1a14; border: 1px solid rgba(201,168,76,.25);
      border-radius: 10px; overflow: hidden; min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      animation: hmSlideIn .15s ease;
    }
    @keyframes hmSlideIn {
      from { opacity:0; transform: translateY(-8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .hm-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 14px 18px; border: none; background: none;
      color: #e8dcc8; font-size: .95rem; font-weight: 600;
      cursor: pointer; font-family: inherit; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .hm-item:last-child { border-bottom: none; }
    .hm-item:active { background: rgba(201,168,76,.1); }
    .hm-item--sub { color: #aaa; font-size: .85rem; font-weight: 400; }
    .hm-icon { font-size: 1rem; }
    .hm-divider { height: 1px; background: rgba(255,255,255,.08); }

    /* ─── 会計履歴 FAB ─── */
    .fab-history {
      position: fixed; bottom: 80px; right: 16px; z-index: 50;
      background: rgba(30,26,20,.92); border: 1px solid rgba(201,168,76,.3);
      border-radius: 20px; padding: 7px 13px;
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; box-shadow: 0 3px 12px rgba(0,0,0,.4);
      color: #c9a84c; font-family: inherit;
    }
    .fab-history:active { background: rgba(201,168,76,.15); }
    .fab-history-icon  { font-size: .85rem; }
    .fab-history-label { font-size: .75rem; font-weight: 700; letter-spacing: .04em; }

    /* ─── 会計履歴 カード ─── */
    .history-total-badge {
      font-size: .75rem; color: #c9a84c; font-weight: 700;
      background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.2);
      border-radius: 12px; padding: 3px 10px;
    }
    .hist-card {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; margin: 6px 16px; overflow: hidden;
    }
    .hist-card details > summary { list-style: none; }
    .hist-card details > summary::-webkit-details-marker { display: none; }
    .hist-summary {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px 11px; cursor: pointer;
    }
    .hist-summary:active { background: rgba(255,255,255,.03); }
    .hist-left  { flex: 1; min-width: 0; }
    .hist-right { text-align: right; flex-shrink: 0; }
    .hist-tablenum { font-size: 1.15rem; font-weight: 700; color: #c9a84c; }
    .hist-name     { font-size: .75rem; color: #888; margin-top: 1px; }
    .hist-time     { font-size: .72rem; color: #999; }
    .hist-total    { font-size: 1rem; font-weight: 700; color: #c9a84c; margin-top: 2px; }
    .hist-arrow    { font-size: .7rem; color: #666; transition: transform .2s; flex-shrink: 0; }
    .hist-card details[open] .hist-arrow { transform: rotate(90deg); }
    .hist-items {
      border-top: 1px solid rgba(255,255,255,.07); padding: 6px 14px 8px;
    }
    .hist-item-row {
      display: flex; align-items: center; gap: 8px; padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,.04); font-size: .85rem;
    }
    .hist-item-row:last-child { border-bottom: none; }
    .hist-item-name { flex: 1; color: #c8bfa8; }
    .hist-item-qty  { color: #888; white-space: nowrap; }
    .hist-item-sub  { color: #c8b870; font-weight: 600; white-space: nowrap; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <h1 class="header-title">双葉</h1>
    <span class="header-subtitle">オーダーシステム</span>
    <div id="conn-status" class="connection-status">接続中...</div>
    <button class="hamburger-btn" onclick="toggleMenu()" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ハンバーガードロワー -->
<div id="hm-overlay" class="hm-overlay hidden" onclick="closeMenu()"></div>
<div id="hm-panel" class="hm-panel hidden">
  <button class="hm-item" onclick="menuNav('order')">
    <span class="hm-icon">✏️</span>注文入力
  </button>
  <button class="hm-item" onclick="menuNav('billing')">
    <span class="hm-icon">💴</span>会計確認
  </button>
  <div class="hm-divider"></div>
  <button class="hm-item hm-item--sub" onclick="menuNav('history')">
    <span class="hm-icon">📋</span>会計履歴
  </button>
  <div class="hm-divider"></div>
  <button class="hm-item hm-item--sub" onclick="closeMenu();addTables()">
    <span class="hm-icon">➕</span>卓21〜50を追加
  </button>
  <button class="hm-item hm-item--sub" onclick="closeMenu();resetMenus()">
    <span class="hm-icon">🔄</span>メニュー再設定
  </button>
</div>

<main class="app-main">

  <!-- 卓一覧 -->
  <section id="tab-tables" class="tab-panel active">
    <div class="panel-header"><h2 class="panel-title">卓一覧</h2></div>
    <div id="tables-list"></div>
  </section>

  <!-- 注文入力 -->
  <section id="tab-order" class="tab-panel">
    <div id="order-form">
      <div class="panel-header"><h2 class="panel-title">注文入力</h2></div>
      <div class="order-form-inner">
        <div class="form-group">
          <label class="form-label">卓番</label>
          <input id="inp-tablenum" type="text" inputmode="numeric" class="form-input"
            placeholder="例: 3" oninput="onTableNumInput()" autocomplete="off">
          <div id="table-found" class="table-found-info"></div>
        </div>
        <div class="form-group">
          <label class="form-label">メモ（アレルギー・要望など）</label>
          <input id="inp-memo" type="text" class="form-input"
            placeholder="例: アレルギー: 卵" autocomplete="off">
        </div>
      </div>
      <div id="menu-list"></div>
      <div class="order-total-bar">
        <span class="order-total-label">合計金額</span>
        <span id="total-display" class="order-total-amount">¥0</span>
      </div>
      <div class="submit-area">
        <button class="btn btn-primary btn-large" onclick="confirmOrder()">確定する</button>
      </div>
    </div>
    <div id="order-preview" class="hidden">
      <div class="panel-header"><h2 class="panel-title">注文確認</h2></div>
      <div id="preview-content"></div>
      <div class="preview-actions">
        <button class="btn btn-outline btn-large" style="flex:1" onclick="backToForm()">修正する</button>
        <button class="btn btn-primary btn-large" style="flex:2" onclick="submitOrder()">送信する</button>
      </div>
    </div>
  </section>

  <!-- 会計確認 -->
  <section id="tab-billing" class="tab-panel">
    <div class="panel-header"><h2 class="panel-title">会計確認</h2></div>
    <div class="billing-search-wrap">
      <input id="billing-search" type="text" inputmode="numeric" class="form-input"
        placeholder="卓番で検索..." oninput="renderBilling()" autocomplete="off">
    </div>
    <div id="billing-list"></div>
  </section>

  <!-- 会計履歴 -->
  <section id="tab-history" class="tab-panel">
    <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;padding-right:16px;">
      <h2 class="panel-title">会計履歴</h2>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="history-total-badge" class="history-total-badge"></span>
        <button onclick="downloadHistoryCSV()" style="
          background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);
          color:var(--gold);font-size:.75rem;font-weight:700;padding:5px 11px;
          border-radius:5px;cursor:pointer;font-family:inherit;">
          ⬇ CSV
        </button>
      </div>
    </div>
    <div class="billing-search-wrap">
      <input id="history-search" type="text" inputmode="numeric" class="form-input"
        placeholder="卓番で絞り込み..." oninput="renderHistory()" autocomplete="off">
    </div>
    <div id="history-list"></div>
  </section>

</main>

<!-- 会計履歴 フローティングボタン -->
<button id="fab-history" class="fab-history" onclick="switchTab('history')">
  <span class="fab-history-icon">📋</span>
  <span class="fab-history-label">履歴</span>
</button>

<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="tables" onclick="switchTab('tables')">
    <span class="nav-icon">卓</span><span class="nav-label">卓一覧</span>
  </button>
</nav>

<div id="toast" class="toast hidden"></div>

<script>
let tables = [], menus = [], orders = [];
let selTableNum = null, qty = {}, itemNotes = {};
// 会計確認での単価上書き { 'tableNum|itemName': customPrice }
const priceOverrides = {};

// ── 起動 ──────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setStatus('接続中...');
  setupListeners();
});

// ── リアルタイムリスナー ───────────────────
function setupListeners() {
  tablesRef.onSnapshot(snap => {
    tables = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    tables.sort((a, b) => parseInt(a.tableNumber) - parseInt(b.tableNumber));
    renderTables(); renderBilling();
    setStatus('接続済み', 'ok');
  }, () => setStatus('オフライン', 'error'));

  menusRef.orderBy('order').onSnapshot(snap => {
    menus = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMenuList();
  });

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  ordersRef.where('createdAt', '>=', todayStart).onSnapshot(snap => {
    orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTables(); renderBilling();
    // 履歴タブが開いていれば更新
    if (document.getElementById('tab-history')?.classList.contains('active')) renderHistory();
  }, () => setStatus('オフライン', 'error'));
}

function setStatus(txt, state) {
  const el = document.getElementById('conn-status');
  if (!el) return;
  el.textContent = txt;
  el.className = 'connection-status' +
    (state === 'ok' ? ' connected' : state === 'error' ? ' error' : '');
}

// ── ハンバーガーメニュー ──────────────────
function toggleMenu() {
  const panel   = document.getElementById('hm-panel');
  const overlay = document.getElementById('hm-overlay');
  const hidden  = panel.classList.contains('hidden');
  panel.classList.toggle('hidden', !hidden);
  overlay.classList.toggle('hidden', !hidden);
}
function closeMenu() {
  document.getElementById('hm-panel').classList.add('hidden');
  document.getElementById('hm-overlay').classList.add('hidden');
}
function menuNav(tab) {
  closeMenu();
  switchTab(tab);
  if (tab === 'billing') renderBilling();
  if (tab === 'history') renderHistory();
}

// ── タブ切り替え ──────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
  // FABは履歴タブ以外で表示
  const fab = document.getElementById('fab-history');
  if (fab) fab.style.display = name === 'history' ? 'none' : 'flex';
  if (name === 'history') renderHistory();
}

// ── 卓一覧 ────────────────────────────────
function renderTables() {
  const el = document.getElementById('tables-list');
  if (!el) return;
  el.innerHTML = tables.map(t => {
    const unpaid  = orders.filter(o => o.tableNumber === t.tableNumber && !o.isPaid);
    const total   = unpaid.reduce((s, o) => s + o.totalPrice, 0);
    const pending = unpaid.filter(o => o.status !== '提供済み').length;
    const memo    = t.tableNote || unpaid.find(o => o.orderNote)?.orderNote || '';
    return `
      <div class="table-row">
        <span class="table-row-num">卓${esc(t.tableNumber)}</span>
        <span class="table-row-name">${esc(memo || '名前なし')}</span>
        ${t.guestCount ? `<span class="table-row-guests">${t.guestCount}名</span>` : ''}
        ${total   ? `<span class="table-row-total">${yen(total)}</span>` : ''}
        ${pending ? `<span class="table-row-pending">${pending}件</span>` : ''}
        <button class="table-row-btn" onclick="openOrderForTable('${esc(t.tableNumber)}')">注文＋</button>
        <button class="table-row-btn table-row-btn--billing" onclick="openBillingForTable('${esc(t.tableNumber)}')">会計</button>
      </div>`;
  }).join('') || '<div class="empty-text">卓がありません</div>';
}

function openBillingForTable(tableNumber) {
  const el = document.getElementById('billing-search');
  if (el) { el.value = tableNumber; }
  switchTab('billing');
  renderBilling();
}

function openOrderForTable(tableNumber) {
  switchTab('order'); showOrderForm();
  document.getElementById('inp-tablenum').value = tableNumber;
  onTableNumInput();
  document.getElementById('inp-tablenum').focus();
}

// ── 注文入力 ──────────────────────────────
function showOrderForm() {
  document.getElementById('order-form').classList.remove('hidden');
  document.getElementById('order-preview').classList.add('hidden');
}

function onTableNumInput() {
  const val = document.getElementById('inp-tablenum').value.trim();
  const t   = tables.find(x => x.tableNumber === val);
  const el  = document.getElementById('table-found');
  if (!val) {
    selTableNum = null; el.textContent = ''; el.className = 'table-found-info';
  } else if (t) {
    selTableNum = val;
    el.textContent = t.displayName + (t.guestCount ? '　' + t.guestCount + '名' : '');
    el.className = 'table-found-info';
  } else {
    selTableNum = null;
    el.textContent = '該当する卓がありません'; el.className = 'table-found-info error';
  }
  renderMenuList(); calcTotal();
}

function renderMenuList() {
  const el = document.getElementById('menu-list');
  if (!el) return;
  if (!selTableNum) {
    el.innerHTML = '<div class="empty-text">卓番を入力するとメニューが表示されます</div>';
    return;
  }
  const visible = menus.filter(m => m.isVisible);
  const cats = [...new Set(visible.map(m => m.category))];
  el.innerHTML = cats.map(cat =>
    `<div class="menu-category-label">${esc(cat)}</div>` +
    visible.filter(m => m.category === cat).map(m => {
      const q = qty[m.id] || 0, sold = m.isSoldOut;
      return `
        <div class="order-menu-item ${q ? 'has-quantity' : ''}" id="mi-${m.id}">
          <div class="menu-item-row">
            <div class="menu-item-info">
              <div class="menu-item-name">${esc(m.name)}${sold ? ' <span style="color:#e06060;font-size:.7rem">売切</span>' : ''}</div>

function setQty(id, d) {
  qty[id] = Math.max(0, (qty[id] || 0) + d);
  const qEl = document.getElementById('q-' + id);
  const mEl = document.getElementById('mi-' + id);
  if (qEl) qEl.textContent = qty[id];
  if (mEl) mEl.classList.toggle('has-quantity', qty[id] > 0);
  calcTotal();
}

function calcTotal() {
  const total = menus.reduce((s, m) => s + m.price * (qty[m.id] || 0), 0);
  const el = document.getElementById('total-display');
  if (el) el.textContent = yen(total);
  return total;
}

async function submitOrder() {
  if (!selTableNum) return;
  const items = menus.filter(m => (qty[m.id] || 0) > 0)
    .map(m => ({ name: m.name, price: m.price, quantity: qty[m.id], note: itemNotes[m.id] || '' }));
  if (!items.length) return;
  const t    = tables.find(x => x.tableNumber === selTableNum);
  const memo = document.getElementById('inp-memo').value.trim();
  try {
    const newOrderRef = ordersRef.doc();
    const orderBatch = db.batch();
    orderBatch.set(newOrderRef, {
      tableNumber: selTableNum,
      displayName: t?.displayName || ('卓' + selTableNum),
      guestCount:  t?.guestCount  || 0,

// ── 会計確認 ──────────────────────────────
function renderBilling() {
  const el = document.getElementById('billing-list');
  if (!el) return;
  const searchVal = (document.getElementById('billing-search')?.value || '').trim();
  const unpaid = orders.filter(o => !o.isPaid);
  if (!unpaid.length) {
    el.innerHTML = '<div class="empty-text" style="padding:24px 16px">未会計の注文はありません</div>';
    return;
  }
  const groups = {};
  unpaid.forEach(o => {
    const key = o.tableNumber;
    if (!groups[key]) {
      const t = tables.find(x => x.tableNumber === key);
      groups[key] = {
        tableId: t?.id, tableNumber: key,
        displayName: t?.displayName || o.displayName,
        guestCount:  t?.guestCount  || o.guestCount,
        memo: t?.tableNote || '', itemMap: {}, total: 0,
      };
    }
    o.items.forEach(i => {
      if (!groups[key].itemMap[i.name]) groups[key].itemMap[i.name] = { price: i.price, qty: 0, notes: [] };
      groups[key].itemMap[i.name].qty += i.quantity;
      if (i.note) groups[key].itemMap[i.name].notes.push(i.note);
    });
    groups[key].total += o.totalPrice;
    if (!groups[key].memo && o.orderNote) groups[key].memo = o.orderNote;
  });
  let list = Object.values(groups).sort((a, b) => parseInt(a.tableNumber) - parseInt(b.tableNumber));
  if (searchVal) list = list.filter(g => g.tableNumber.startsWith(searchVal));
  if (!list.length) {
    el.innerHTML = `<div class="empty-text" style="padding:24px 16px">卓番 "${esc(searchVal)}" の未会計注文はありません</div>`;
    return;
  }
  el.innerHTML = list.map(g => {
    const pp = g.guestCount > 0
      ? `<div class="billing-per-person">1人あたり ${yen(Math.ceil(g.total / g.guestCount))}</div>` : '';
    const itemRows = Object.entries(g.itemMap).map(([name, {price, qty, notes}]) => {
      const key = `${g.tableNumber}|${name}`;
      const effPrice = priceOverrides[key] !== undefined ? priceOverrides[key] : price;
      const edited = priceOverrides[key] !== undefined;
      const noteStr = [...new Set((notes || []).filter(Boolean))].join(' / ');
      return `
      <div class="billing-item-row" style="flex-wrap:wrap;">
        <span class="billing-item-name">${esc(name)}</span>
        <span class="billing-item-qty">× ${qty}</span>
        <span class="billing-item-price-wrap">
          <span class="billing-item-unit${edited ? ' price-edited' : ''}">${yen(effPrice)}</span>
          <button class="billing-edit-price-btn" onclick="editPrice('${g.tableNumber}','${esc(name)}',${effPrice})">✎</button>
        </span>
        <span class="billing-item-sub">${yen(effPrice * qty)}</span>
        ${noteStr ? `<span class="billing-item-memo">${esc(noteStr)}</span>` : ''}
      </div>`;
    }).join('');
    // priceOverridesを考慮した合計
    const calcTotal = Object.entries(g.itemMap).reduce((s, [name, {price, qty}]) => {
      const key = `${g.tableNumber}|${name}`;
      const effPrice = priceOverrides[key] !== undefined ? priceOverrides[key] : price;
      return s + effPrice * qty;
    }, 0);
    const ppCalc = g.guestCount > 0
      ? `<div class="billing-per-person">1人あたり ${yen(Math.ceil(calcTotal / g.guestCount))}</div>` : '';
    return `
      <div class="billing-card">
        <details>
          <summary class="billing-summary">
            <div class="billing-left">
              <div class="billing-tablenum">卓 ${g.tableNumber}</div>
              <div class="billing-name">${esc(g.memo || '名前なし')}</div>
            </div>
            <div class="billing-right">
              <div class="billing-total-amount">${yen(calcTotal)}</div>${ppCalc}
            </div>
            <span class="billing-arrow">▶</span>
          </summary>
          <div class="billing-items">${itemRows}</div>
        </details>
        <div class="billing-paid-wrap">
          <button class="btn btn-accent billing-paid-btn"
            onclick="markPaid('${g.tableId}','${g.tableNumber}',${calcTotal})">
            会計済みにする（${yen(calcTotal)}）
          </button>
        </div>
      </div>`;
  }).join('');
}

async function markPaid(tableId, tableNumber, calcTotal) {
  if (!confirm('会計済みにしますか？')) return;
  try {
    const batch = db.batch();
    orders.filter(o => o.tableNumber === tableNumber && !o.isPaid)
      .forEach(o => {
        // 値引き後の実際の支払額を注文ごとに算出して保存
        const effectiveTotalPrice = (o.items || []).reduce((s, i) => {
          const key = `${tableNumber}|${i.name}`;
          const p = priceOverrides[key] !== undefined ? priceOverrides[key] : i.price;
          return s + p * i.quantity;
        }, 0);
        batch.update(ordersRef.doc(o.id), { isPaid: true, effectiveTotalPrice });
      });
    // tableId が正常な文字列のときだけ卓ドキュメントを更新
    if (tableId && tableId !== 'undefined') {
      batch.update(tablesRef.doc(tableId), { isPaid: true, isActive: false, guestCount: 0, tableNote: '' });
    }
    await batch.commit();
    Object.keys(priceOverrides).forEach(k => {
      if (k.startsWith(tableNumber + '|')) delete priceOverrides[k];
    });
    toast('会計を完了しました', 'success');
  } catch(e) { toast('エラー: ' + e.message, 'error'); }
}

function editPrice(tableNumber, itemName, currentPrice) {
  const input = prompt(`「${itemName}」の単価を変更\n現在: ¥${currentPrice.toLocaleString('ja-JP')}`, currentPrice);
  if (input === null) return;
  const newPrice = parseInt(input.replace(/[¥,]/g, ''), 10);
  if (isNaN(newPrice) || newPrice < 0) {
    toast('正しい金額を入力してください', 'error'); return;
  }
  priceOverrides[`${tableNumber}|${itemName}`] = newPrice;
  renderBilling();
}

// ── 会計履歴 ─────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!el) return;
  const searchVal = (document.getElementById('history-search')?.value || '').trim();
  let paid = orders.filter(o => o.isPaid);
  if (searchVal) paid = paid.filter(o => o.tableNumber.startsWith(searchVal));

  const badge = document.getElementById('history-total-badge');

  if (!paid.length) {
    if (badge) badge.textContent = '';
    el.innerHTML = `<div class="empty-text" style="padding:24px 16px">会計済みの記録はありません</div>`;
    return;
  }

  // 卓番でグループ化
  const groups = {};
  paid.forEach(o => {
    const key = o.tableNumber;
    if (!groups[key]) groups[key] = { tableNumber: key, name: '', ordersList: [], itemMap: {}, total: 0 };
    const g = groups[key];
    g.ordersList.push(o);
    g.total += (o.effectiveTotalPrice ?? o.totalPrice) || 0;
    if (!g.name) g.name = o.tableNote || o.orderNote || '';
    (o.items || []).forEach(i => {
      if (!g.itemMap[i.name]) g.itemMap[i.name] = { price: i.price, qty: 0 };
      g.itemMap[i.name].qty += i.quantity;
    });
  });

  // 最終注文時間で降順ソート（直近の会計が上）
  const toMs = o => {
    if (!o.createdAt) return 0;
    return o.createdAt.toDate ? o.createdAt.toDate().getTime() : new Date(o.createdAt).getTime();
  };
  const groupList = Object.values(groups).sort((a, b) => {
    const latestA = Math.max(...a.ordersList.map(toMs));
    const latestB = Math.max(...b.ordersList.map(toMs));
    return latestB - latestA;
  });

  // バッジ
  if (badge) {
    const totalAmt = groupList.reduce((s, g) => s + g.total, 0);
    badge.textContent = `${groupList.length}卓 / ${yen(totalAmt)}`;
  }

  el.innerHTML = groupList.map(g => {
    const times   = g.ordersList.map(toMs).filter(Boolean);
    const minTime = times.length ? Math.min(...times) : null;
    const maxTime = times.length ? Math.max(...times) : null;
    const fmt = ms => {
      const d = new Date(ms);
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    };
    const timeRange = minTime
      ? (maxTime !== minTime ? `${fmt(minTime)} 〜 ${fmt(maxTime)}` : fmt(minTime))
      : '--:--';

    const itemRows = Object.entries(g.itemMap).map(([name, {price, qty}]) => `
      <div class="hist-item-row">
        <span class="hist-item-name">${esc(name)}</span>
        <span class="hist-item-qty">×${qty}</span>
        <span class="hist-item-sub">${yen(price * qty)}</span>
      </div>`).join('');

    return `
      <div class="hist-card">
        <details>
          <summary class="hist-summary">
            <div class="hist-left">
              <div class="hist-tablenum">卓 ${esc(g.tableNumber)}</div>
              <div class="hist-name">${esc(g.name || '名前なし')}</div>
            </div>
            <div class="hist-right">
              <div class="hist-time">${timeRange}</div>
              <div class="hist-total">${yen(g.total)}</div>
            </div>
            <span class="hist-arrow">▶</span>
          </summary>
          <div class="hist-items">${itemRows}</div>
        </details>
      </div>`;
  }).join('');
}

// ── 会計履歴 CSV ──────────────────────────
function downloadHistoryCSV() {
  const paid = orders.filter(o => o.isPaid);
  if (!paid.length) { toast('会計履歴がありません', 'error'); return; }

  const toMs = o => {
    if (!o.createdAt) return 0;
    return o.createdAt.toDate ? o.createdAt.toDate().getTime() : new Date(o.createdAt).getTime();
  };
  const fmt = ms => {
    const d = new Date(ms);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  };

  // 卓番でグループ化
  const groups = {};
  paid.forEach(o => {
    const key = o.tableNumber;
    if (!groups[key]) groups[key] = { tableNumber: key, name: '', ordersList: [], itemMap: {}, total: 0 };
    const g = groups[key];
    g.ordersList.push(o);
    g.total += (o.effectiveTotalPrice ?? o.totalPrice) || 0;
    if (!g.name) g.name = o.tableNote || o.orderNote || '';
    (o.items || []).forEach(i => {
      if (!g.itemMap[i.name]) g.itemMap[i.name] = { price: i.price, qty: 0 };
      g.itemMap[i.name].qty += i.quantity;
    });
  });

  const groupList = Object.values(groups).sort((a, b) => {
    const la = Math.max(...a.ordersList.map(toMs));
    const lb = Math.max(...b.ordersList.map(toMs));
    return parseInt(a.tableNumber) - parseInt(b.tableNumber);
  });

  const rows = [['卓番', '卓名', '受注時間', '品目', '数量', '単価', '小計', '卓合計']];
  groupList.forEach(g => {
    const times = g.ordersList.map(toMs).filter(Boolean);
    const minT = times.length ? Math.min(...times) : null;
    const maxT = times.length ? Math.max(...times) : null;
    const timeRange = minT ? (maxT !== minT ? `${fmt(minT)}〜${fmt(maxT)}` : fmt(minT)) : '';
    Object.entries(g.itemMap).forEach(([name, {price, qty}], idx) => {
      rows.push([
        g.tableNumber,
        g.name || '名前なし',
        idx === 0 ? timeRange : '',
        name,
        qty,
        price,
        price * qty,
        idx === 0 ? g.total : '',
      ]);
    });
  });

  const csv = '﻿' + rows.map(r =>
    r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toLocaleDateString('ja-JP').replace(/\//g, '');
  a.href = url; a.download = `双葉_会計履歴_${date}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('CSVをダウンロードしました', 'success');
}

    const snap = await menusRef.get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(menusRef.doc(d.id)));
    await batch.commit();

    // 新しいメニューを登録
    const b2 = db.batch();
    [
      {name:'限定焼きそば',    price:1000, category:'フード',  isVisible:true,isSoldOut:false,order:1},
      {name:'黒唐揚げ',        price:800,  category:'フード',  isVisible:true,isSoldOut:false,order:2},
      {name:'痛風だし巻き',    price:900,  category:'フード',  isVisible:true,isSoldOut:false,order:3},
      {name:'春焼売',          price:800,  category:'フード',  isVisible:true,isSoldOut:false,order:4},
      {name:'ブルームコーヒー',price:600,  category:'フード',  isVisible:true,isSoldOut:false,order:5},
      {name:'ANNIE HALLBAR',   price:1000, category:'フード',  isVisible:true,isSoldOut:false,order:6},
      {name:'ときや',          price:1000, category:'フード',  isVisible:true,isSoldOut:false,order:7},
      {name:'ドリンク',        price:500,  category:'ドリンク',isVisible:true,isSoldOut:false,order:8},
      {name:'グラスワイン',    price:700,  category:'ドリンク',isVisible:true,isSoldOut:false,order:9},
      {name:'ボトルワイン',    price:3000, category:'ドリンク',isVisible:true,isSoldOut:false,order:10},
    ].forEach(m => b2.set(menusRef.doc(), m));
    await b2.commit();
    toast('メニューを更新しました！', 'success');
  } catch(e) { toast('エラー: ' + e.message, 'error'); }
}
